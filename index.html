<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delight & Savor — Charlotte Mason Literature Curriculum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <header class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-name" id="brand-name"></span>
        <span class="brand-tagline" id="brand-tagline"></span>
      </a>
      <div class="nav-social" id="nav-social"></div>
      <nav class="nav-links" id="nav-links"></nav>
      <a class="nav-cta" id="nav-cta" href="#"></a>
    </div>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero-inner">
        <div class="hero-content">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 class="hero-headline" id="hero-headline"></h1>
          <p class="hero-sub" id="hero-sub"></p>
          <div class="hero-buttons" id="hero-buttons"></div>
        </div>
        <div class="hero-book">
          <div class="book-mockup">
            <div class="book-header">
              <span>Delight & Savor</span>
              <span class="book-series">Living Literature & Language Series</span>
            </div>
            <div class="book-image"></div>
            <div class="book-title">Macbeth</div>
          </div>
        </div>
      </div>
      <div class="new-here-strip" id="new-here-strip"></div>
    </section>

    <!-- PHILOSOPHY -->
    <section class="philosophy" id="philosophy">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="phil-eyebrow"></p>
          <h2 class="section-title" id="phil-title"></h2>
          <p class="section-intro" id="phil-intro"></p>
        </div>
        <div class="pillars-grid" id="pillars-grid"></div>
        <div class="philosophy-cta" id="philosophy-cta"></div>
      </div>
      <div class="pull-quote-band" id="pull-quote-band"></div>
    </section>

    <!-- CURRICULUM -->
    <section class="curriculum" id="curriculum">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="curr-eyebrow"></p>
          <h2 class="section-title" id="curr-title"></h2>
          <p class="section-intro" id="curr-desc"></p>
        </div>
        <div class="curriculum-bundle" id="curriculum-bundle"></div>
        <div class="curriculum-units" id="curriculum-units"></div>
      </div>
    </section>

    <!-- ABOUT STRIP -->
    <section class="about-strip" id="about-strip">
      <div class="about-strip-inner">
        <p class="about-tagline" id="about-tagline"></p>
        <div class="about-credentials" id="about-credentials"></div>
        <a class="btn btn-outline" id="about-cta" href="#journal"></a>
      </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="testimonials" id="testimonials">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="test-eyebrow"></p>
          <h2 class="section-title" id="test-title"></h2>
        </div>
        <div class="testimonials-grid" id="testimonials-grid"></div>
      </div>
    </section>

    <!-- CHARLOTTE MASON -->
    <section class="cm-section" id="cm-section">
      <div class="section-inner cm-inner">
        <div class="cm-text">
          <div class="section-header left-align">
            <p class="eyebrow" id="cm-eyebrow"></p>
            <h2 class="section-title" id="cm-title"></h2>
          </div>
          <div class="cm-paragraphs" id="cm-paragraphs"></div>
        </div>
        <div class="cm-sidebar">
          <div class="cm-quote-box" id="cm-quote-box"></div>
          <div class="cm-tags" id="cm-tags"></div>
        </div>
      </div>
    </section>

    <!-- TEACHER'S NOTEBOOK PREVIEW -->
    <section class="notebook-preview" id="notebook-preview">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow">A Free Resource</p>
          <h2 class="section-title">Teacher's <em>Notebook</em></h2>
          <p class="section-intro">Practical notes from the co-op classroom and homeschool table — on narration, discussion, pacing, and the art of teaching literature well. From one teacher to another.</p>
        </div>
        <div class="notebook-cards" id="notebook-cards"></div>
        <div class="section-cta">
          <a href="teachers-notebook.html" class="btn btn-outline">Open the Notebook</a>
        </div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="faq" id="faq">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="faq-eyebrow"></p>
          <h2 class="section-title" id="faq-title"></h2>
        </div>
        <div class="faq-list" id="faq-list"></div>
      </div>
    </section>

    <!-- COMING SOON -->
    <section class="coming-soon" id="coming-soon">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="cs-eyebrow"></p>
          <h2 class="section-title" id="cs-title"></h2>
          <p class="section-intro" id="cs-desc"></p>
        </div>
        <div class="coming-grid" id="coming-grid"></div>
      </div>
    </section>

    <!-- JOURNAL / EMAIL -->
    <section class="journal-band" id="journal">
      <div class="journal-inner">
        <p class="eyebrow light" id="journal-eyebrow"></p>
        <h2 class="journal-title" id="journal-title"></h2>
        <p class="journal-desc" id="journal-desc"></p>
        <div class="journal-form">
          <input type="email" id="journal-email-input" placeholder="Your email address" />
          <a class="btn btn-gold" id="journal-cta" href="https://delightandsavor.substack.com">Read for Free</a>
        </div>
        <a class="journal-substack-link" id="journal-substack" href="https://delightandsavor.substack.com"></a>
      </div>
    </section>

    <!-- EMAIL SIGNUP -->
    <section class="email-signup" id="email-signup">
      <div class="signup-inner">
        <p class="eyebrow light" id="signup-eyebrow"></p>
        <h2 class="signup-headline" id="signup-headline"></h2>
        <p class="signup-desc" id="signup-desc"></p>
        <div class="signup-form">
          <input type="email" placeholder="Your email address" />
          <a class="btn btn-gold" href="https://delightandsavor.substack.com" id="signup-cta"></a>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="contact" id="contact">
      <div class="section-inner">
        <div class="section-header">
          <p class="eyebrow" id="contact-eyebrow"></p>
          <h2 class="section-title" id="contact-title"></h2>
          <p class="section-intro" id="contact-desc"></p>
        </div>
        <div class="contact-grid" id="contact-grid"></div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" id="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-name" id="footer-brand-name"></span>
        <span class="brand-tagline" id="footer-brand-tagline"></span>
      </div>
      <nav class="footer-links" id="footer-links"></nav>
      <div class="footer-social" id="footer-social"></div>
    </div>
    <div class="footer-copyright" id="footer-copyright"></div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
